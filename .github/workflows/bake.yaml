name: 🧁 Bake Postgres Images

on:
  push:
  #   branches:
  #     - main
  #   paths:
  #     - .github/workflows/bake.yaml
  #     - "[dD]ocker*"
  # pull_request:
  #   branches:
  #     - main
  #   paths:
  #     - .github/workflows/bake.yaml
  #     - "[dD]ocker*"
  schedule:
    - cron: 0 8 * * 1

jobs:
  bake:
    # https://docs.github.com/en/actions/writing-workflows/choosing-where-your-workflow-runs/choosing-the-runner-for-a-job#standard-github-hosted-runners-for-public-repositories
    strategy:
      matrix:
        arch: [["🦾", "arm64"], ["🤖", "amd64"]]
    name: 🧁 Bake Images for ${{ matrix.arch[0] }} ${{ matrix.arch[1] }}
    runs-on: ubuntu-${{ matrix.arch[1] == 'arm64' && '24.04-arm' || 'latest' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub # required for un-throttled pulls
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
      # - name: Set up QEMU
      #   if: github.ref_name == 'main'
      #   uses: docker/setup-qemu-action@v3
      #   with:
      #     platforms: arm64
      #     # TODO: remove once docker/setup-qemu-action uses the new version.
      #     # https://github.com/docker/setup-qemu-action/issues/198#issuecomment-2690225370
      #     image: 'tonistiigi/binfmt:qemu-v9.2.2'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build the Images
        uses: docker/bake-action@v6
        env:
          registry: quay.io/tembo
          revision: ${{ github.sha }}
        with:
          set: "*.platform=linux/${{ matrix.arch[1] }}"
          push: ${{ github.ref_name == 'main' }}
